name: Agent dev
on:
  workflow_dispatch: # Allows you to run it manually from the Actions tab
jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true # Speeds up subsequent runs even more
          # The version of Python to set UV_PYTHON to
          python-version: "3.14.3"
          
      - name: Run agent with uv
        # 'uv run' will automatically handle dependencies if defined in the script
        env:
          # Mapping the secret to the environment variable
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: uv run agent.py

      - name: Open Review PR
        uses: peter-evans/create-pull-request@v6
        with:
          branch: ai-full-build
          title: "🤖 Build Proposal: Ready for Human Review"
          body: |
            The AI has generated a complete project skeleton in `/proposed_build` 
            based on your README update. 
            
            **Review Checklist:**
            - [ ] Check `Makefile` for security.
            - [ ] Verify `pyproject.toml` versions.
            - [ ] Run `docker build` to test.
      
